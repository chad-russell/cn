# Nebula Phone Config - import CA/cert/key files separately in the app

static_host_map:
  "10.10.0.1": ["192.168.20.105:4242"]

lighthouse:
  am_lighthouse: false
  interval: 60
  hosts:
    - "10.10.0.1"

listen:
  host: 0.0.0.0
  port: 4242

punchy:
  punch: true
  respond: true

tun:
  mtu: 1300
  unsafe_routes:
    - route: 192.168.20.0/24
      via: 10.10.0.1

logging:
  level: info

firewall:
  outbound:
    - port: any
      proto: any
      host: any
  inbound:
    - port: any
      proto: any
      host: any
