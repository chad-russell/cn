static_host_map:
  "10.10.0.1": ["192.168.20.105:4243"] # local lighthouse (LAN only)
  "10.10.0.2": ["178.156.171.212:4242"] # Hetzner lighthouse+relay (public)

lighthouse:
  am_lighthouse: false
  interval: 60
  hosts:
    - "10.10.0.1"
    - "10.10.0.2"

listen:
  host: 0.0.0.0
  port: 4242

punchy:
  punch: true
  respond: true

relay:
  use_relays: true
  relays:
    - "10.10.0.2"

tun:
  unsafe_routes:
    - route: "192.168.20.0/24"
      via: "10.10.0.6"

preferred_ranges:
  - "192.168.20.0/24"

firewall:
  conntrack:
    tcp_timeout: 120h
    udp_timeout: 3m
    default_timeout: 10m
    max_connections: 100000
  outbound:
    - port: any
      proto: any
      host: any
  inbound:
    - port: any
      proto: any
      host: any
