# Local Lighthouse - crussell-srv (container)
# Nebula IP 10.10.0.1 is reserved for this dedicated lighthouse identity.
# Uses UDP 4243 so it can coexist with the primary Nebula host instance on 4242.

pki:
  ca: /config/ca.crt
  cert: /config/crussell-lh-local.crt
  key: /config/crussell-lh-local.key

static_host_map: {}

lighthouse:
  am_lighthouse: true
  interval: 60
  hosts: []

listen:
  host: 0.0.0.0
  port: 4243

punchy:
  punch: true
  respond: true

relay:
  am_relay: false
  use_relays: false

tun:
  disabled: true

logging:
  level: info
  format: text

firewall:
  conntrack:
    tcp_timeout: 120h
    udp_timeout: 3m
    default_timeout: 10m
    max_connections: 100000
  
  outbound:
    - port: any
      proto: any
      host: any
  
  inbound:
    - port: any
      proto: any
      host: any
