# Hetzner Lighthouse + Relay (178.156.171.212)
# Public-facing lighthouse that also acts as relay for roaming clients

pki:
  ca: /etc/nebula/ca.crt
  cert: /etc/nebula/host.crt
  key: /etc/nebula/host.key

static_host_map: {} # No static entries needed - nodes connect to us

lighthouse:
  am_lighthouse: true
  interval: 60
  hosts: [] # We are a lighthouse, no others to query

listen:
  host: 0.0.0.0
  port: 4242

punchy:
  punch: true
  respond: true

relay:
  am_relay: true # ENABLE RELAY - this is key for roaming
  use_relays: false # Don't use other relays

tun:
  disabled: false
  dev: nebula0
  drop_local_broadcast: false
  drop_multicast: false
  tx_queue: 500
  mtu: 1300

logging:
  level: info
  format: text

firewall:
  conntrack:
    tcp_timeout: 12m
    udp_timeout: 3m
    default_timeout: 10m
    max_connections: 100000

  outbound:
    - port: any
      proto: any
      host: any

  inbound:
    - port: any
      proto: any
      host: any
