pki:
  ca: /etc/nebula/ca.crt
  cert: /etc/nebula/hetzner-lh.crt
  key: /etc/nebula/hetzner-lh.key

static_host_map:
  "10.10.0.1": ["192.168.20.105:4242"]

lighthouse:
  am_lighthouse: true
  interval: 60
  hosts:
    - "10.10.0.1"

listen:
  host: 0.0.0.0
  port: 4242

punchy:
  punch: true
  respond: true

relay:
  am_relay: false
  use_relays: false

tun:
  disabled: false
  dev: nebula0
  drop_local_broadcast: false
  drop_multicast: false
  tx_queue: 500
  mtu: 1300

logging:
  level: info
  format: text

firewall:
  conntrack:
    tcp_timeout: 12m
    udp_timeout: 3m
    default_timeout: 10m
    max_connections: 100000

  outbound:
    - port: any
      proto: any
      host: any

  inbound:
    - port: any
      proto: any
      host: any
