# Nebula config for ThinkPad laptop (roaming client)
# Uses dual lighthouses:
# - 10.10.0.1 local lighthouse on LAN (192.168.20.105:4243)
# - 10.10.0.2 Hetzner lighthouse+relay (178.156.171.212:4242)

pki:
  ca: /etc/nebula/ca.crt
  cert: /etc/nebula/laptop.crt
  key: /etc/nebula/laptop.key

static_host_map:
  "10.10.0.1": ["192.168.20.105:4243"]
  "10.10.0.2": ["178.156.171.212:4242"]

lighthouse:
  am_lighthouse: false
  interval: 60
  hosts:
    - "10.10.0.1"
    - "10.10.0.2"

listen:
  host: 0.0.0.0
  port: 0

punchy:
  punch: true
  respond: true

relay:
  am_relay: false
  use_relays: true
  relays:
    - "10.10.0.2"

tun:
  disabled: false
  dev: nebula0

preferred_ranges:
  - "192.168.20.0/24"

logging:
  level: info
  format: text

firewall:
  conntrack:
    tcp_timeout: 120h
    udp_timeout: 3m
    default_timeout: 10m
    max_connections: 100000

  outbound:
    - port: any
      proto: any
      host: any

  inbound:
    - port: any
      proto: any
      host: any
