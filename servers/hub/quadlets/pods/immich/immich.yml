apiVersion: v1
kind: Pod
metadata:
  name: immich
spec:
  containers:
    - name: server
      image: ghcr.io/immich-app/immich-server:release
      env:
        - name: DB_HOSTNAME
          value: localhost
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: "immich_secret_password_change_me"
        - name: DB_DATABASE_NAME
          value: immich
        - name: REDIS_HOSTNAME
          value: localhost
        - name: TYPESENSE_ENABLED
          value: "false"
      volumeMounts:
        - name: photos
          mountPath: /data
      livenessProbe:
        httpGet:
          path: /
          port: 2283
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3

    - name: machine-learning
      image: ghcr.io/immich-app/immich-machine-learning:release
      env:
        - name: MACHINE_LEARNING_HOST
          value: localhost
        - name: MACHINE_LEARNING_PORT
          value: "3003"
      volumeMounts:
        - name: model-cache
          mountPath: /cache

    - name: valkey
      image: docker.io/valkey/valkey:9-alpine
      args:
        - valkey-server
        - --save
        - "60"
        - "1"
        - --loglevel
        - warning
      livenessProbe:
        exec:
          command:
            - valkey-cli
            - ping
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 5

    - name: database
      image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
      env:
        - name: POSTGRES_PASSWORD
          value: "immich_secret_password_change_me"
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_DB
          value: immich
        - name: POSTGRES_INITDB_ARGS
          value: "--data-checksums"
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      livenessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - postgres
            - -d
            - immich
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 5

  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: immich-postgres-data
    - name: photos
      hostPath:
        path: /mnt/nas/photos
        type: Directory
    - name: model-cache
      emptyDir: {}
