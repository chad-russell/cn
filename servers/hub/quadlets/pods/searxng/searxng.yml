apiVersion: v1
kind: Pod
metadata:
  name: searxng
spec:
  containers:
    - name: searxng
      image: docker.io/searxng/searxng:latest
      env:
        - name: SEARXNG_BASE_URL
          value: https://searxng.internal.crussell.io/
        - name: SEARXNG_REDIS_URL
          value: redis://localhost:6379/0
      volumeMounts:
        - name: settings
          mountPath: /etc/searxng
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 40
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3

    - name: valkey
      image: docker.io/valkey/valkey:8-alpine
      args:
        - valkey-server
        - --save
        - "30"
        - "1"
        - --loglevel
        - warning
      volumeMounts:
        - name: valkey-data
          mountPath: /data

  volumes:
    - name: settings
      hostPath:
        path: /srv/searxng
        type: Directory
    - name: valkey-data
      hostPath:
        path: /srv/searxng/valkey
        type: DirectoryOrCreate
