# llama-swap YAML configuration

healthCheckTimeout: 60

# logLevel: standard info level for general operation.
logLevel: info

# startPort: A good starting point for internal proxy ports.
startPort: 10001

# 'llama-cmd': A reusable command prefix for all models.
# Path is CORRECTED to: /usr/bin/llama-server
macros:
  "llama-cmd": >
    /usr/bin/llama-server
    --port ${PORT}
    --host 127.0.0.1
    -ngl 999
    -m

