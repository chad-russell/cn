version: '3.8'

services:
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/tank:/extra/tank:ro
      - /mnt/tank/photos:/extra/photos:ro
      - /mnt/tank/backups:/extra/backups:ro
    env_file:
      - ./secrets/beszel-nas.env
    environment:
      - LISTEN=45876
      - HUB_URL=http://192.168.20.64:8090
